<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Control Room — Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 30px; margin: 0; }
    h1 { margin-bottom: 6px; font-size: 22px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }

    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: #666; margin: 32px 0 12px;
      border-bottom: 1px solid #222; padding-bottom: 6px;
    }

    /* Two column layout */
    .columns { display: flex; gap: 30px; align-items: flex-start; }
    .col { flex: 1; }

    /* Cards */
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 16px; margin-bottom: 10px;
    }
    .card-title { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
    .card-sub { font-size: 12px; color: #666; }
    .card-actions { margin-top: 10px; display: flex; gap: 8px; }

    /* Buttons */
    .btn {
      padding: 8px 16px; font-size: 13px; border: none;
      border-radius: 4px; cursor: pointer;
    }
    .btn-primary { background: #c0392b; color: white; }
    .btn-primary:hover { background: #e74c3c; }
    .btn-secondary { background: #2471a3; color: white; }
    .btn-secondary:hover { background: #2e86c1; }
    .btn-ghost { background: #2a2a2a; color: #aaa; }
    .btn-ghost:hover { background: #333; color: white; }
    .btn-danger { background: #333; color: #e74c3c; }
    .btn-danger:hover { background: #4a1010; }
    .btn-green { background: #1e8449; color: white; }
    .btn-green:hover { background: #27ae60; }

    /* Forms */
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .form-row input, .form-row textarea {
      width: 100%; padding: 8px 10px; font-size: 14px;
      background: #222; color: white; border: 1px solid #444; border-radius: 4px;
    }
    .form-row textarea { min-height: 180px; resize: vertical; font-family: monospace; line-height: 1.6; }

    /* Set list song order */
    #setlist-songs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .setlist-song {
      display: flex; align-items: center; gap: 10px;
      background: #1e3a2f; border: 1px solid #2ecc71;
      border-radius: 4px; padding: 10px 14px;
    }
    .setlist-song-title { flex: 1; font-size: 14px; }
    .setlist-song-artist { font-size: 12px; color: #888; }

    /* Song picker */
    #song-picker { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
    .picker-song {
      display: flex; align-items: center; justify-content: space-between;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 4px; padding: 10px 14px;
    }
    .picker-song-info { font-size: 14px; }
    .picker-song-artist { font-size: 12px; color: #666; }

    #status { margin-top: 20px; font-size: 13px; color: #2ecc71; min-height: 20px; }

    .date-display { font-size: 20px; font-weight: bold; color: #2ecc71; margin-bottom: 4px; }
    .no-items { color: #444; font-size: 14px; padding: 12px 0; }
  </style>
</head>
<body>
  <h1>Control Room — Admin</h1>
  <p class="subtitle">Manage songs and prepare Sunday set lists</p>

  <div class="columns">

    <!-- LEFT: Set List Manager -->
    <div class="col">
      <div class="section-title">Sunday Set List</div>

      <div class="card">
        <div class="form-row">
          <label>Service Date</label>
          <input type="date" id="service-date" />
        </div>
        <div class="form-row">
          <label>Set List Title (optional)</label>
          <input type="text" id="setlist-title" placeholder="e.g. Easter Sunday, Morning Service" />
        </div>

        <div class="section-title" style="margin-top:16px;">Songs in this Set List</div>
        <div id="setlist-songs"><div class="no-items">No songs added yet.</div></div>

        <div class="section-title">Add Song to Set List</div>
        <div id="song-picker"><div class="no-items">Loading songs...</div></div>

        <div style="margin-top:16px; display:flex; gap:10px;">
          <button class="btn btn-green" onclick="saveSetlist()">💾 Save Set List</button>
          <button class="btn btn-ghost" onclick="loadSetlist()">↩ Load Existing</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Song Library -->
    <div class="col">
      <div class="section-title">Song Library</div>

      <div class="card">
        <div class="card-title">Add New Song</div>
        <div class="card-sub" style="margin-bottom:12px;">Enter lyrics two lines per slide, separated by a blank line between slides.</div>
        <div class="form-row">
          <label>Song Title</label>
          <input type="text" id="new-song-title" placeholder="e.g. Amazing Grace" />
        </div>
        <div class="form-row">
          <label>Artist / Band (optional)</label>
          <input type="text" id="new-song-artist" placeholder="e.g. Traditional" />
        </div>
        <div class="form-row">
          <label>Lyrics (2 lines per slide, blank line between slides)</label>
          <textarea id="new-song-lyrics" placeholder="Amazing grace, how sweet the sound
That saved a wretch like me

I once was lost but now am found
Was blind but now I see"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addSong()">+ Add Song</button>
      </div>

      <div class="section-title">Existing Songs</div>
      <div id="song-library"><div class="no-items">Loading...</div></div>
    </div>

  </div>

  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vzxfcydeqapjcnuakgib.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6eGZjeWRlcWFwamNudWFrZ2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM3NjAsImV4cCI6MjA5Mjg4OTc2MH0.ZYvflsej6MVDOQswT-ZVLWjXhauZqWRThttPf8DfxEE';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allSongs = [];
    let setlistSongIds = []; // ordered list of song ids for current set list

    // ── HELPERS ──────────────────────────────────────────────────
    function setStatus(msg, color = '#2ecc71') {
      const el = document.getElementById('status');
      el.style.color = color;
      el.textContent = msg;
      setTimeout(() => el.textContent = '', 4000);
    }

    function parseLyrics(raw) {
      // Split into slide blocks by blank lines
      const blocks = raw.trim().split(/\n\s*\n/);
      return blocks.map((block, i) => {
        const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
        return {
          label: `Slide ${i + 1}`,
          line1: lines[0] || '',
          line2: lines[1] || ''
        };
      }).filter(s => s.line1);
    }

    // ── SONG LIBRARY ─────────────────────────────────────────────
    async function loadSongs() {
      const { data, error } = await client.from('songs').select('*').order('title');
      if (error) { setStatus('Error loading songs: ' + error.message, '#e74c3c'); return; }
      allSongs = data || [];
      renderSongLibrary();
      renderSongPicker();
    }

    function renderSongLibrary() {
      const container = document.getElementById('song-library');
      if (allSongs.length === 0) { container.innerHTML = '<div class="no-items">No songs yet.</div>'; return; }
      container.innerHTML = '';
      allSongs.forEach(song => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div class="card-title">${song.title}</div>
          <div class="card-sub">${song.artist || ''} &nbsp;·&nbsp; ${song.slides.length} slides</div>
          <div class="card-actions">
            <button class="btn btn-danger" onclick="deleteSong(${song.id}, '${song.title.replace(/'/g, "\\'")}')">Delete</button>
          </div>`;
        container.appendChild(div);
      });
    }

    function renderSongPicker() {
      const container = document.getElementById('song-picker');
      if (allSongs.length === 0) { container.innerHTML = '<div class="no-items">No songs in library yet.</div>'; return; }
      container.innerHTML = '';
      allSongs.forEach(song => {
        const alreadyAdded = setlistSongIds.includes(song.id);
        const div = document.createElement('div');
        div.className = 'picker-song';
        div.innerHTML = `
          <div>
            <div class="picker-song-info">${song.title}</div>
            <div class="picker-song-artist">${song.artist || ''}</div>
          </div>
          <button class="btn ${alreadyAdded ? 'btn-ghost' : 'btn-secondary'}"
            onclick="toggleSongInSetlist(${song.id})"
            ${alreadyAdded ? 'disabled' : ''}>
            ${alreadyAdded ? '✓ Added' : '+ Add'}
          </button>`;
        container.appendChild(div);
      });
    }

    async function addSong() {
      const title = document.getElementById('new-song-title').value.trim();
      const artist = document.getElementById('new-song-artist').value.trim();
      const raw = document.getElementById('new-song-lyrics').value.trim();
      if (!title) { setStatus('Please enter a song title.', '#e74c3c'); return; }
      if (!raw) { setStatus('Please enter some lyrics.', '#e74c3c'); return; }
      const slides = parseLyrics(raw);
      if (slides.length === 0) { setStatus('Could not parse any slides from lyrics.', '#e74c3c'); return; }
      const { error } = await client.from('songs').insert({ title, artist, slides });
      if (error) { setStatus('Error: ' + error.message, '#e74c3c'); return; }
      document.getElementById('new-song-title').value = '';
      document.getElementById('new-song-artist').value = '';
      document.getElementById('new-song-lyrics').value = '';
      setStatus(`"${title}" added with ${slides.length} slides.`);
      await loadSongs();
    }

    async function deleteSong(id, title) {
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
      const { error } = await client.from('songs').delete().eq('id', id);
      if (error) { setStatus('Error: ' + error.message, '#e74c3c'); return; }
      setStatus(`"${title}" deleted.`);
      setlistSongIds = setlistSongIds.filter(sid => sid !== id);
      await loadSongs();
      renderSetlistSongs();
    }

    // ── SET LIST ─────────────────────────────────────────────────
    function toggleSongInSetlist(songId) {
      if (!setlistSongIds.includes(songId)) {
        setlistSongIds.push(songId);
      }
      renderSetlistSongs();
      renderSongPicker();
    }

    function removeSongFromSetlist(songId) {
      setlistSongIds = setlistSongIds.filter(id => id !== songId);
      renderSetlistSongs();
      renderSongPicker();
    }

    function moveSong(index, direction) {
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= setlistSongIds.length) return;
      const tmp = setlistSongIds[index];
      setlistSongIds[index] = setlistSongIds[newIndex];
      setlistSongIds[newIndex] = tmp;
      renderSetlistSongs();
    }

    function renderSetlistSongs() {
      const container = document.getElementById('setlist-songs');
      if (setlistSongIds.length === 0) {
        container.innerHTML = '<div class="no-items">No songs added yet.</div>';
        return;
      }
      container.innerHTML = '';
      setlistSongIds.forEach((id, i) => {
        const song = allSongs.find(s => s.id === id);
        if (!song) return;
        const div = document.createElement('div');
        div.className = 'setlist-song';
        div.innerHTML = `
          <div style="display:flex;gap:4px;flex-direction:column;">
            <button class="btn btn-ghost" style="padding:2px 8px;font-size:11px;" onclick="moveSong(${i}, -1)">▲</button>
            <button class="btn btn-ghost" style="padding:2px 8px;font-size:11px;" onclick="moveSong(${i}, 1)">▼</button>
          </div>
          <div style="flex:1">
            <div class="setlist-song-title">${song.title}</div>
            <div class="setlist-song-artist">${song.artist || ''} · ${song.slides.length} slides</div>
          </div>
          <button class="btn btn-danger" style="padding:6px 12px;" onclick="removeSongFromSetlist(${id})">✕</button>`;
        container.appendChild(div);
      });
    }

    async function saveSetlist() {
      const dateVal = document.getElementById('service-date').value;
      const titleVal = document.getElementById('setlist-title').value.trim();
      if (!dateVal) { setStatus('Please pick a service date.', '#e74c3c'); return; }
      if (setlistSongIds.length === 0) { setStatus('Add at least one song.', '#e74c3c'); return; }

      const { error } = await client.from('setlists').upsert({
        service_date: dateVal,
        title: titleVal || null,
        song_ids: setlistSongIds
      }, { onConflict: 'service_date' });

      if (error) { setStatus('Error saving: ' + error.message, '#e74c3c'); return; }
      setStatus(`Set list saved for ${dateVal}!`);
    }

    async function loadSetlist() {
      const dateVal = document.getElementById('service-date').value;
      if (!dateVal) { setStatus('Pick a date to load.', '#e74c3c'); return; }
      const { data, error } = await client.from('setlists')
        .select('*').eq('service_date', dateVal).single();
      if (error || !data) { setStatus('No set list found for that date.', '#e74c3c'); return; }
      setlistSongIds = data.song_ids || [];
      document.getElementById('setlist-title').value = data.title || '';
      renderSetlistSongs();
      renderSongPicker();
      setStatus(`Loaded set list for ${dateVal}.`);
    }

    // Set default date to next Sunday
    function getNextSunday() {
      const d = new Date();
      const day = d.getDay();
      const diff = day === 0 ? 0 : 7 - day;
      d.setDate(d.getDate() + diff);
      return d.toISOString().split('T')[0];
    }

    document.getElementById('service-date').value = getNextSunday();
    loadSongs();
  </script>
</body>
</html>
