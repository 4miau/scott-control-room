<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      width: 1920px;
      height: 1080px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }
    #lyric-block {
      text-align: center;
      padding: 0 120px 100px;
    }
    #line1 { font-size: 72px; font-weight: bold; line-height: 1.2; }
    #line2 { font-size: 60px; font-weight: normal; line-height: 1.2; margin-top: 12px; opacity: 0.85; }
  </style>
</head>
<body>
  <div id="lyric-block">
    <div id="line1">Line one will appear here</div>
    <div id="line2">Line two will appear here</div>
  </div>
</body>
</html>
