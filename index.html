<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Control Room — Operator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 40px; }
    h1 { margin-bottom: 24px; }
    label { display: block; margin-top: 16px; font-size: 14px; opacity: 0.7; }
    input[type="text"] {
      display: block; width: 100%; max-width: 600px;
      padding: 10px; margin-top: 6px;
      font-size: 18px; background: #222; color: white;
      border: 1px solid #444; border-radius: 4px;
    }
    button {
      margin-top: 20px; padding: 12px 32px;
      font-size: 16px; background: #c0392b; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #e74c3c; }
    #status { margin-top: 16px; font-size: 14px; opacity: 0.6; }
  </style>
</head>
<body>
  <h1>Control Room</h1>
  <label>Line 1</label>
  <input type="text" id="line1" placeholder="First lyric line" />
  <label>Line 2</label>
  <input type="text" id="line2" placeholder="Second lyric line" />
  <br />
  <button onclick="pushLyrics()">Push to Overlay</button>
  <div id="status">Ready.</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vzxfcydeqapjcnuakgib.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6eGZjeWRlcWFwamNudWFrZ2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM3NjAsImV4cCI6MjA5Mjg4OTc2MH0.ZYvflsej6MVDOQswT-ZVLWjXhauZqWRThttPf8DfxEE';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function pushLyrics() {
      const line1 = document.getElementById('line1').value;
      const line2 = document.getElementById('line2').value;

      document.getElementById('status').textContent = 'Pushing...';

      const { error } = await client
        .from('live')
        .update({ line1, line2, updated_at: new Date().toISOString() })
        .eq('id', 1);

      if (error) {
        console.error('Push error:', error);
        document.getElementById('status').textContent = 'Error: ' + error.message;
      } else {
        document.getElementById('status').textContent = `Pushed at ${new Date().toLocaleTimeString()}`;
      }
    }
  </script>
</body>
</html>
