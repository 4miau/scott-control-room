<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Control Room — Operator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 40px; }
    h1 { margin-bottom: 24px; }
    label { display: block; margin-top: 16px; font-size: 14px; opacity: 0.7; }
    input[type="text"] {
      display: block; width: 100%; max-width: 600px;
      padding: 10px; margin-top: 6px;
      font-size: 18px; background: #222; color: white;
      border: 1px solid #444; border-radius: 4px;
    }
    button {
      margin-top: 20px; padding: 12px 32px;
      font-size: 16px; background: #c0392b; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #e74c3c; }
    #status { margin-top: 16px; font-size: 14px; opacity: 0.6; }
  </style>
</head>
<body>
  <h1>Control Room</h1>
  <label>Line 1</label>
  <input type="text" id="line1" placeholder="First lyric line" />
  <label>Line 2</label>
  <input type="text" id="line2" placeholder="Second lyric line" />
  <br />
  <button onclick="pushLyrics()">Push to Overlay</button>
  <div id="status">Ready.</div>

  <script>
    function pushLyrics() {
      const line1 = document.getElementById('line1').value;
      const line2 = document.getElementById('line2').value;
      // Phase 1: just log to console — database comes in Phase 2
      console.log('Pushing:', line1, line2);
      document.getElementById('status').textContent = `Pushed: "${line1}" / "${line2}"`;
    }
  </script>
</body>
</html>
