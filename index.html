<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Control Room — Operator</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 30px; margin: 0; }
    h1 { margin-bottom: 6px; font-size: 22px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }

    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: #666; margin: 32px 0 12px;
      border-bottom: 1px solid #222; padding-bottom: 6px;
    }

    /* Song tabs */
    #song-tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 10px 20px; background: #222; color: #aaa;
      border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    .tab-btn.active { background: #c0392b; color: white; border-color: #c0392b; }

    #setlist-label { font-size: 13px; color: #666; margin-bottom: 10px; }

    /* Slide buttons */
    #slides-grid { display: flex; flex-direction: column; gap: 10px; max-width: 700px; }
    .slide-btn {
      padding: 14px 18px; background: #1a1a1a; color: #ddd;
      border: 1px solid #333; border-radius: 4px; cursor: pointer;
      text-align: left; font-size: 15px; line-height: 1.5;
    }
    .slide-btn:hover { background: #2a2a2a; border-color: #555; }
    .slide-btn.active { background: #1e3a2f; border-color: #2ecc71; color: white; }
    .slide-label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* Bible search */
    #bible-search-row { display: flex; gap: 10px; max-width: 700px; margin-bottom: 10px; }
    #bible-search-row input {
      flex: 1; padding: 10px; font-size: 16px;
      background: #222; color: white; border: 1px solid #444; border-radius: 4px;
    }
    #bible-search-row button {
      padding: 10px 20px; font-size: 15px;
      background: #6c3483; color: white; border: none; border-radius: 4px; cursor: pointer;
    }
    #bible-search-row button:hover { background: #7d3c98; }
    #bible-results { max-width: 700px; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .bible-result-btn {
      padding: 12px 16px; background: #1a1a1a; color: #ddd;
      border: 1px solid #333; border-radius: 4px; cursor: pointer;
      text-align: left; font-size: 14px; line-height: 1.5;
    }
    .bible-result-btn:hover { background: #2a2a2a; border-color: #555; }
    .bible-result-btn.active { background: #2e1a47; border-color: #7d3c98; color: white; }
    .bible-result-ref { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    #bible-status { font-size: 13px; color: #666; margin-top: 6px; }

    /* Lower third */
    .lt-row { display: flex; gap: 10px; max-width: 700px; margin-bottom: 10px; }
    .lt-row input {
      flex: 1; padding: 10px; font-size: 16px;
      background: #222; color: white; border: 1px solid #444; border-radius: 4px;
    }
    #push-lt-btn {
      padding: 12px 28px; font-size: 15px; background: #2471a3; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
    #push-lt-btn:hover { background: #2e86c1; }
    #push-lt-btn.active { background: #1a5276; border: 2px solid #2e86c1; }

    #clear-btn {
      margin-top: 28px; padding: 12px 32px; font-size: 15px;
      background: #333; color: #aaa; border: 1px solid #555; border-radius: 4px; cursor: pointer;
    }
    #clear-btn:hover { background: #444; color: white; }
    #status { margin-top: 14px; font-size: 13px; opacity: 0.5; }
    .no-setlist { color: #555; font-size: 14px; padding: 10px 0; }
  </style>
</head>
<body>
  <h1>Control Room</h1>
  <p class="subtitle">Operator view — <a href="admin.html" style="color:#c0392b;">Go to Admin</a></p>

  <div class="section-title">Lyrics</div>
  <div id="setlist-label">Loading set list...</div>
  <div id="song-tabs"></div>
  <div id="slides-grid"></div>

  <div class="section-title">Bible Verse</div>
  <div id="bible-search-row">
    <input type="text" id="bible-query" placeholder="e.g. John 3:16 or &quot;fear not&quot;" onkeydown="if(event.key==='Enter') searchBible()" />
    <button onclick="searchBible()">Search</button>
  </div>
  <div id="bible-status"></div>
  <div id="bible-results"></div>

  <div class="section-title">Lower Third</div>
  <div class="lt-row">
    <input type="text" id="lt-name" placeholder="Name (e.g. Scott Johnson)" />
    <input type="text" id="lt-title" placeholder="Title (e.g. Lead Pastor)" />
  </div>
  <button id="push-lt-btn" onclick="pushLowerThird()">Show Lower Third</button>

  <button id="clear-btn" onclick="clearOverlay()">⬛ Clear Overlay</button>
  <div id="status">Ready.</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vzxfcydeqapjcnuakgib.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6eGZjeWRlcWFwamNudWFrZ2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM3NjAsImV4cCI6MjA5Mjg4OTc2MH0.ZYvflsej6MVDOQswT-ZVLWjXhauZqWRThttPf8DfxEE';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let songs = [];
    let activeSongIndex = 0;
    let activeSlideIndex = null;
    let activeBibleIndex = null;
    let bibleResults = [];

    // ── LOAD TODAY'S SET LIST ────────────────────────────────────
    function getTodaySunday() {
      const d = new Date();
      const day = d.getDay();
      const diff = day === 0 ? 0 : 7 - day;
      d.setDate(d.getDate() + diff);
      return d.toISOString().split('T')[0];
    }

    async function loadSetlist() {
      const sunday = getTodaySunday();
      const { data: setlist } = await client.from('setlists')
        .select('*').eq('service_date', sunday).single();

      if (!setlist || !setlist.song_ids.length) {
        document.getElementById('setlist-label').textContent = 'No set list found for this Sunday. Go to Admin to create one.';
        document.getElementById('song-tabs').innerHTML = '';
        document.getElementById('slides-grid').innerHTML = '';
        return;
      }

      // Load songs in set list order
      const { data: songData } = await client.from('songs')
        .select('*').in('id', setlist.song_ids);

      // Sort by set list order
      songs = setlist.song_ids
        .map(id => songData.find(s => s.id === id))
        .filter(Boolean);

      const label = setlist.title
        ? `${setlist.title} — ${sunday}`
        : `Set list for ${sunday}`;
      document.getElementById('setlist-label').textContent = label;

      renderTabs();
      renderSlides();
    }

    // ── TABS & SLIDES ────────────────────────────────────────────
    function renderTabs() {
      const container = document.getElementById('song-tabs');
      container.innerHTML = '';
      songs.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === activeSongIndex ? ' active' : '');
        btn.textContent = song.title;
        btn.onclick = () => { activeSongIndex = i; activeSlideIndex = null; renderTabs(); renderSlides(); };
        container.appendChild(btn);
      });
    }

    function renderSlides() {
      const container = document.getElementById('slides-grid');
      container.innerHTML = '';
      if (!songs.length) return;
      songs[activeSongIndex].slides.forEach((slide, i) => {
        const btn = document.createElement('button');
        btn.className = 'slide-btn' + (i === activeSlideIndex ? ' active' : '');
        btn.innerHTML = `<div class="slide-label">${slide.label}</div>${slide.line1}<br>${slide.line2}`;
        btn.onclick = () => pushSlide(i);
        container.appendChild(btn);
      });
    }

    async function pushSlide(index) {
      activeSlideIndex = index;
      activeBibleIndex = null;
      renderSlides();
      renderBibleResults();
      document.getElementById('push-lt-btn').classList.remove('active');
      const slide = songs[activeSongIndex].slides[index];
      const { error } = await client.from('live')
        .update({ mode: 'lyrics', line1: slide.line1, line2: slide.line2, updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error
        ? 'Error: ' + error.message
        : `Pushed "${slide.label}" at ${new Date().toLocaleTimeString()}`;
    }

    // ── BIBLE SEARCH ─────────────────────────────────────────────
    async function searchBible() {
      const query = document.getElementById('bible-query').value.trim();
      if (!query) return;
      document.getElementById('bible-status').textContent = 'Searching...';
      document.getElementById('bible-results').innerHTML = '';
      bibleResults = [];
      activeBibleIndex = null;

      const refMatch = query.match(/^(\d?\s?[a-zA-Z]+(?:\s[a-zA-Z]+)?)\s+(\d+):(\d+)$/);
      let data, error;

      if (refMatch) {
        const book = refMatch[1].trim();
        const chapter = parseInt(refMatch[2]);
        const verse = parseInt(refMatch[3]);
        ({ data, error } = await client.from('bible')
          .select('book, chapter, verse, text')
          .ilike('book', `%${book}%`)
          .eq('chapter', chapter)
          .eq('verse', verse)
          .limit(5));
      } else {
        ({ data, error } = await client.from('bible')
          .select('book, chapter, verse, text')
          .ilike('text', `%${query}%`)
          .limit(12));
      }

      if (error) { document.getElementById('bible-status').textContent = 'Error: ' + error.message; return; }
      if (!data || data.length === 0) { document.getElementById('bible-status').textContent = 'No results found.'; return; }
      bibleResults = data;
      document.getElementById('bible-status').textContent = `${data.length} result${data.length > 1 ? 's' : ''} found`;
      renderBibleResults();
    }

    function renderBibleResults() {
      const container = document.getElementById('bible-results');
      container.innerHTML = '';
      bibleResults.forEach((v, i) => {
        const ref = `${v.book} ${v.chapter}:${v.verse}`;
        const btn = document.createElement('button');
        btn.className = 'bible-result-btn' + (i === activeBibleIndex ? ' active' : '');
        btn.innerHTML = `<div class="bible-result-ref">${ref}</div>${v.text}`;
        btn.onclick = () => pushBibleVerse(i);
        container.appendChild(btn);
      });
    }

    async function pushBibleVerse(index) {
      activeBibleIndex = index;
      activeSlideIndex = null;
      renderSlides();
      renderBibleResults();
      document.getElementById('push-lt-btn').classList.remove('active');
      const v = bibleResults[index];
      const ref = `${v.book} ${v.chapter}:${v.verse}`;
      const { error } = await client.from('live')
        .update({ mode: 'bible', line1: v.text, line2: ref, updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error
        ? 'Error: ' + error.message
        : `Pushed ${ref} at ${new Date().toLocaleTimeString()}`;
    }

    // ── LOWER THIRD ──────────────────────────────────────────────
    async function pushLowerThird() {
      const name = document.getElementById('lt-name').value.trim();
      const title = document.getElementById('lt-title').value.trim();
      if (!name) { document.getElementById('status').textContent = 'Enter a name first.'; return; }
      activeSlideIndex = null;
      activeBibleIndex = null;
      renderSlides();
      renderBibleResults();
      document.getElementById('push-lt-btn').classList.add('active');
      const { error } = await client.from('live')
        .update({ mode: 'lower-third', lower_name: name, lower_title: title, updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error
        ? 'Error: ' + error.message
        : `Lower third: "${name}" pushed at ${new Date().toLocaleTimeString()}`;
    }

    // ── CLEAR ────────────────────────────────────────────────────
    async function clearOverlay() {
      activeSlideIndex = null;
      activeBibleIndex = null;
      renderSlides();
      renderBibleResults();
      document.getElementById('push-lt-btn').classList.remove('active');
      const { error } = await client.from('live')
        .update({ mode: 'lyrics', line1: '', line2: '', updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error ? 'Error: ' + error.message : 'Overlay cleared.';
    }

    loadSetlist();
  </script>
</body>
</html>
