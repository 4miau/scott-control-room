<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Control Room — Operator</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 30px; margin: 0; }
    h1 { margin-bottom: 24px; font-size: 22px; }

    /* Section headers */
    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: #666; margin: 32px 0 12px;
      border-bottom: 1px solid #222; padding-bottom: 6px;
    }

    /* Song tabs */
    #song-tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 10px 20px; background: #222; color: #aaa;
      border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    .tab-btn.active { background: #c0392b; color: white; border-color: #c0392b; }

    /* Slide buttons */
    #slides-grid { display: flex; flex-direction: column; gap: 10px; max-width: 700px; }
    .slide-btn {
      padding: 14px 18px; background: #1a1a1a; color: #ddd;
      border: 1px solid #333; border-radius: 4px; cursor: pointer;
      text-align: left; font-size: 15px; line-height: 1.5;
    }
    .slide-btn:hover { background: #2a2a2a; border-color: #555; }
    .slide-btn.active { background: #1e3a2f; border-color: #2ecc71; color: white; }
    .slide-label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* Lower third inputs */
    .lt-row { display: flex; gap: 10px; max-width: 700px; margin-bottom: 10px; }
    .lt-row input {
      flex: 1; padding: 10px; font-size: 16px;
      background: #222; color: white; border: 1px solid #444; border-radius: 4px;
    }
    #push-lt-btn {
      padding: 12px 28px; font-size: 15px;
      background: #2471a3; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
    #push-lt-btn:hover { background: #2e86c1; }
    #push-lt-btn.active { background: #1a5276; border: 2px solid #2e86c1; }

    /* Clear button */
    #clear-btn {
      margin-top: 28px; padding: 12px 32px;
      font-size: 15px; background: #333; color: #aaa;
      border: 1px solid #555; border-radius: 4px; cursor: pointer;
    }
    #clear-btn:hover { background: #444; color: white; }
    #status { margin-top: 14px; font-size: 13px; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>Control Room</h1>

  <div class="section-title">Lyrics</div>
  <div id="song-tabs"></div>
  <div id="slides-grid"></div>

  <div class="section-title">Lower Third</div>
  <div class="lt-row">
    <input type="text" id="lt-name" placeholder="Name (e.g. Scott Johnson)" />
    <input type="text" id="lt-title" placeholder="Title (e.g. Lead Pastor)" />
  </div>
  <button id="push-lt-btn" onclick="pushLowerThird()">Show Lower Third</button>

  <button id="clear-btn" onclick="clearOverlay()">⬛ Clear Overlay</button>
  <div id="status">Ready.</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vzxfcydeqapjcnuakgib.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6eGZjeWRlcWFwamNudWFrZ2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM3NjAsImV4cCI6MjA5Mjg4OTc2MH0.ZYvflsej6MVDOQswT-ZVLWjXhauZqWRThttPf8DfxEE';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const SONGS = [
      {
        title: 'Gratitude',
        slides: [
          { label: 'Verse 1a', line1: 'All my words fall short', line2: 'I got nothing new' },
          { label: 'Verse 1b', line1: 'How could I express', line2: 'All my gratitude?' },
          { label: 'Verse 2a', line1: 'I could sing these songs', line2: 'As I often do' },
          { label: 'Verse 2b', line1: 'But every song must end', line2: 'And You never do' },
        ]
      },
      {
        title: 'Goodness of God',
        slides: [
          { label: 'Chorus 1a', line1: 'I love You, Lord', line2: 'Oh, Your mercy never failed me' },
          { label: 'Chorus 1b', line1: 'And all my days, I\'ve been held in Your hands', line2: 'From the moment that I wake up' },
          { label: 'Chorus 1c', line1: 'Until I lay my head', line2: 'Oh, I will sing of the goodness of God' },
          { label: 'Chorus 2a', line1: 'All my life You have been faithful', line2: 'All my life You have been so, so good' },
          { label: 'Chorus 2b', line1: 'With every breath that I am able', line2: 'Oh, I will sing of the goodness of God' },
        ]
      }
    ];

    let activeSongIndex = 0;
    let activeSlideIndex = null;
    let activeLowerThird = false;

    function renderTabs() {
      const container = document.getElementById('song-tabs');
      container.innerHTML = '';
      SONGS.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === activeSongIndex ? ' active' : '');
        btn.textContent = song.title;
        btn.onclick = () => { activeSongIndex = i; activeSlideIndex = null; renderTabs(); renderSlides(); };
        container.appendChild(btn);
      });
    }

    function renderSlides() {
      const container = document.getElementById('slides-grid');
      container.innerHTML = '';
      SONGS[activeSongIndex].slides.forEach((slide, i) => {
        const btn = document.createElement('button');
        btn.className = 'slide-btn' + (i === activeSlideIndex ? ' active' : '');
        btn.innerHTML = `<div class="slide-label">${slide.label}</div>${slide.line1}<br>${slide.line2}`;
        btn.onclick = () => pushSlide(i);
        container.appendChild(btn);
      });
    }

    async function pushSlide(index) {
      activeSongIndex = activeSongIndex;
      activeSlideIndex = index;
      activeLowerThird = false;
      document.getElementById('push-lt-btn').classList.remove('active');
      renderSlides();
      const slide = SONGS[activeSongIndex].slides[index];
      const { error } = await client
        .from('live')
        .update({ mode: 'lyrics', line1: slide.line1, line2: slide.line2, updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error
        ? 'Error: ' + error.message
        : `Pushed "${slide.label}" at ${new Date().toLocaleTimeString()}`;
    }

    async function pushLowerThird() {
      const name = document.getElementById('lt-name').value.trim();
      const title = document.getElementById('lt-title').value.trim();
      if (!name) { document.getElementById('status').textContent = 'Enter a name first.'; return; }

      activeLowerThird = true;
      activeSlideIndex = null;
      renderSlides();
      document.getElementById('push-lt-btn').classList.add('active');

      const { error } = await client
        .from('live')
        .update({ mode: 'lower-third', lower_name: name, lower_title: title, updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error
        ? 'Error: ' + error.message
        : `Lower third: "${name}" pushed at ${new Date().toLocaleTimeString()}`;
    }

    async function clearOverlay() {
      activeLowerThird = false;
      activeSlideIndex = null;
      renderSlides();
      document.getElementById('push-lt-btn').classList.remove('active');
      const { error } = await client
        .from('live')
        .update({ mode: 'lyrics', line1: '', line2: '', updated_at: new Date().toISOString() })
        .eq('id', 1);
      document.getElementById('status').textContent = error ? 'Error: ' + error.message : 'Overlay cleared.';
    }

    renderTabs();
    renderSlides();
  </script>
</body>
</html>
